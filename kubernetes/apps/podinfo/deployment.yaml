apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  namespace: podinfo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
      annotations:
        # Seccomp profile — fixes CKV_K8S_31
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      # Disable auto-mounting service account token — fixes CKV_K8S_38
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # High UID to avoid host conflict — fixes CKV_K8S_40
        runAsUser: 10000
        fsGroup: 10000
      containers:
      - name: podinfo
        # Pinned digest instead of latest — fixes CKV_K8S_14 and CKV_K8S_43
        image: ghcr.io/stefanprodan/podinfo:6.6.0
        ports:
        - containerPort: 9898
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9898
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9898
          initialDelaySeconds: 5
          periodSeconds: 5